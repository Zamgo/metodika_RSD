name: Deploy Quartz to FTP/SFTP

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_DEST: RSD_Plzen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: node ./quartz/bootstrap-cli.mjs build -d ..

      - name: Copy Apache rules for Quartz (no .html)
        run: cp scripts/apache-quartz.htaccess site/public/.htaccess

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Test FTP connection
        working-directory: site
        run: |
          lftp -d -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASS }}" "ftp://${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}" <<EOF
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 20
          set net:max-retries 1
          set net:reconnect-interval-base 5
          pwd
          ls
          quit
          EOF

      - name: Deploy site/public to RSD_Plzen (FTP)
        working-directory: site
        run: |
          lftp -d -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASS }}" "ftp://${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }}" <<EOF
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 20
          set net:max-retries 1
          set net:reconnect-interval-base 5
          mkdir -p "${FTP_DEST}"
          mirror -R --delete --verbose --exclude-glob ".htaccess" "public/" "${FTP_DEST}/"
          put -O "${FTP_DEST}" "public/.htaccess"
          quit
          EOF

